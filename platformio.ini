; ============================================================
;  Soon — a little countdown gadget that updates itself
;
;  Three build targets, because LilyGO T-Displays come in flavors:
;    tdisplay           -> classic T-Display    (ESP32,    1.14" 135x240 LCD)
;    tdisplay-s3        -> T-Display-S3         (ESP32-S3, 1.9"  170x320 LCD)
;    tdisplay-s3-amoled -> T-Display-S3 AMOLED  (ESP32-S3, 1.91" 536x240 AMOLED)  <- Ben's board
;
;  Build the one that matches the board in your hand:
;    pio run -e tdisplay-s3-amoled
; ============================================================

[platformio]
default_envs = tdisplay-s3   ; <- the board you are flashing now (amoled env still available)

[env]
framework = arduino
platform = espressif32@6.11.0
monitor_speed = 115200
extra_scripts = pre:scripts/version.py
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.4.1

; ---- Common TFT_eSPI options (fonts etc.) ----
build_flags =
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DUSER_SETUP_LOADED=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; ------------------------------------------------------------
; Classic LilyGO / TTGO T-Display (ESP32, 1.14" ST7789, SPI)
; ------------------------------------------------------------
[env:tdisplay]
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${env.build_flags}
    -DSOON_BOARD_ID=\"tdisplay\"
    -DPIN_BUTTON_A=35
    -DPIN_BUTTON_B=0
    -DPIN_LCD_POWER=-1
    -DPIN_BAT_ADC=34
    ; --- TFT_eSPI pin map (matches Setup25_TTGO_T_Display.h) ---
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DCGRAM_OFFSET=1
    -DTFT_MISO=-1
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000

; ------------------------------------------------------------
; LilyGO T-Display-S3 (ESP32-S3, 1.9" ST7789, 8-bit parallel)
; ------------------------------------------------------------
[env:tdisplay-s3]
board = esp32-s3-devkitc-1
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
lib_deps =
    ${env.lib_deps}
    ; CST816 touch driver (T-Display-S3 Touch variant). Harmless on the
    ; non-touch variant: probe fails quietly, buttons still work.
    lewisxhe/SensorLib@0.2.4
build_flags =
    ${env.build_flags}
    -DSOON_BOARD_ID=\"tdisplay-s3\"
    -DPIN_BUTTON_A=14
    -DPIN_BUTTON_B=0
    -DPIN_LCD_POWER=15
    -DPIN_BAT_ADC=4
    ; --- CST816 touch (Touch variant): SDA/SCL/INT/RST ---
    -DSOON_LCD_TOUCH=1
    -DPIN_TOUCH_SDA=18
    -DPIN_TOUCH_SCL=17
    -DPIN_TOUCH_INT=16
    -DPIN_TOUCH_RST=21
    ; USB-CDC so the serial monitor works over the built-in USB port
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- TFT_eSPI pin map (matches Setup206_LilyGo_T_Display_S3.h) ---
    -DST7789_DRIVER=1
    -DINIT_SEQUENCE_3=1
    -DCGRAM_OFFSET=1
    -DTFT_INVERSION_ON=1
    -DTFT_PARALLEL_8_BIT=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH

; ------------------------------------------------------------
; LilyGO T-Display-S3 AMOLED (ESP32-S3, 1.91" RM67162, QSPI)
; TFT_eSPI is used ONLY as a sprite/font engine here (never init'd);
; frames are pushed to the panel by src/amoled/rm67162.cpp.
; ------------------------------------------------------------
[env:tdisplay-s3-amoled]
board = esp32-s3-devkitc-1
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi   ; 8MB OPI PSRAM (holds the frame buffer)
lib_deps =
    ${env.lib_deps}
    ; LilyGO's official AMOLED driver — auto-detects the exact panel variant
    ; (1.91 / 1.91-touch / 1.47 / 2.41) and handles init, offsets, touch, PMU.
    ; Registry package: installs WITHOUT needing git on the machine.
    xinyuan-lilygo/LilyGo-AMOLED-Series@1.2.3
build_flags =
    ${env.build_flags}
    -DSOON_BOARD_ID=\"tdisplay-s3-amoled\"
    -DSOON_AMOLED=1
    -DBOARD_HAS_PSRAM
    -DPIN_BUTTON_A=21
    -DPIN_BUTTON_B=0
    -DPIN_BAT_ADC=4
    -DPIN_LCD_POWER=-1   ; the LilyGO library manages panel power itself
    ; USB-CDC so the serial monitor works over the built-in USB port
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- dummy TFT_eSPI setup: sprite-only use, no pins ---
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=536
    -DTFT_MISO=-1
    -DTFT_MOSI=-1
    -DTFT_SCLK=-1
    -DTFT_CS=-1
    -DTFT_DC=-1
    -DTFT_RST=-1
    -DSPI_FREQUENCY=40000000
